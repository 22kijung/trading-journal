<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매매일지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" style="display:none; position:fixed; inset:0; background:#0f0f13; z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:16px;">
    <div style="font-size:26px; font-weight:700; color:#7b68ee; letter-spacing:-0.5px;">매매일지</div>
    <div style="font-size:14px; color:#9090a8; margin-bottom:8px;">로그인 후 사용하세요</div>
    <button onclick="signInWithGoogle()" style="display:flex; align-items:center; gap:10px; background:#fff; color:#333; border:none; border-radius:12px; padding:13px 28px; font-size:15px; font-weight:600; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.3);">
      <img src="https://www.google.com/favicon.ico" width="18" height="18"> Google로 로그인
    </button>
  </div>

  <div class="app" style="display:none;">

    <!-- 헤더 -->
    <header class="header">
      <div class="header-inner">
        <span class="logo">매매일지</span>
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="today" id="today-date"></span>
          <button onclick="signOut()" style="display:flex; align-items:center; gap:5px; background:rgba(240,96,96,0.1); border:1px solid rgba(240,96,96,0.25); color:#f06060; font-size:11px; font-weight:600; cursor:pointer; padding:5px 10px; border-radius:20px; transition:all 0.15s;" onmouseover="this.style.background='rgba(240,96,96,0.2)'" onmouseout="this.style.background='rgba(240,96,96,0.1)'">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#f06060" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            로그아웃
          </button>
        </div>
      </div>
    </header>

    <!-- 탭 (스크롤 가능) -->
    <nav class="tabs" id="main-tabs">
      <button class="tab" data-tab="entry">진입 체크</button>
      <button class="tab active" data-tab="portfolio">보유 포지션</button>
      <button class="tab" data-tab="watchlist">관심 종목</button>
      <button class="tab" data-tab="review">트레이드 로그</button>
      <button class="tab" data-tab="stats">통계</button>
      <button class="tab" data-tab="diary">매매 메모</button>
    </nav>

    <!-- 스와이프 컨테이너 -->
    <div id="swipe-container">

      <!-- 진입 체크 -->
      <section id="tab-entry" class="tab-content">
        <div class="form-card" id="entry-form"></div>
      </section>

      <!-- 보유 포지션 -->
      <section id="tab-portfolio" class="tab-content active">
        <div class="summary-grid" id="summary-grid"></div>
        <div class="section-label">포지션 목록</div>
        <div id="portfolio-list"></div>
        <button class="fab" onclick="openEntryModal()">+ 신규 매매</button>
      </section>

      <!-- 관심 종목 -->
      <section id="tab-watchlist" class="tab-content">
        <div class="section-label">매수 조건 대기</div>
        <div id="watchlist-list"></div>
        <button class="fab" onclick="openWatchModal()">+ 관심 종목 추가</button>
      </section>

      <!-- 트레이드 로그 -->
      <section id="tab-review" class="tab-content">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="section-label" style="margin-bottom:0">매도 완료 복기</div>
          <button onclick="exportCSV()" style="display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV 내보내기
          </button>
        </div>
        <div id="review-list"></div>
      </section>

      <!-- 통계 -->
      <section id="tab-stats" class="tab-content">
        <div class="section-label" style="margin-bottom:12px">수익률 통계</div>
        <div id="stats-content"></div>
      </section>

      <!-- 매매 메모 -->
      <section id="tab-diary" class="tab-content">
        <div class="section-label">매매 일기</div>
        <div id="diary-list"></div>
        <button class="fab" onclick="openDiaryModal()">+ 메모 추가</button>
      </section>

    </div><!-- /swipe-container -->
  </div>

  <!-- 모달 오버레이 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()" id="modal-body"></div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>

  <!-- ⑤ 스와이프 탭 전환 -->
  <script>
    const TAB_ORDER = ['entry','portfolio','watchlist','review','stats','diary'];
    let touchStartX = 0, touchStartY = 0;

    // 전체 화면에서 스와이프 감지 (헤더/탭바 제외한 콘텐츠 영역)
    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      // 수평 스와이프만 처리 (세로 스크롤과 구분)
      if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.6) return;
      // 모달 열려있으면 스와이프 무시
      if (document.getElementById('modal-overlay').classList.contains('open')) return;
      const activeTab = document.querySelector('.tab.active')?.dataset?.tab;
      const idx = TAB_ORDER.indexOf(activeTab);
      const nextIdx = dx < 0 ? Math.min(idx + 1, TAB_ORDER.length - 1) : Math.max(idx - 1, 0);
      if (nextIdx !== idx) {
        const nextTab = document.querySelector(`.tab[data-tab="${TAB_ORDER[nextIdx]}"]`);
        if (nextTab) nextTab.click();
      }
    }, { passive: true });
  </script>
</body>
</html>
